<style>*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAF8;color:#1A1916;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font-family:inherit}
button{cursor:pointer}
:root{--gold:#C9A84C;--gold-d:#a07020;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--serif:Georgia,serif;--bg:#FAFAF8;--bg2:#F2F0EA;--border:#E0DDD4;--txt:#1A1916;--txt2:#6B6860;--txt3:#A09E97}
#app{flex:1;display:flex;flex-direction:column;overflow:hidden}
#v-client{flex:1;display:flex;flex-direction:column;overflow:hidden}
#v-login{display:none;align-items:center;justify-content:center;flex:1}
#v-admin{display:none;flex-direction:column;flex:1;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:center;gap:14px;padding:1rem 3.5rem .9rem;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;user-select:none;-webkit-user-select:none;position:relative}
.hdr-sup{font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--txt2);margin-bottom:.3rem}
.hdr-title{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--txt);line-height:1.1}
.hdr-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt3);margin-top:.25rem}
.hdr-info{text-align:center}
.btn-fs{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:var(--txt2);cursor:pointer}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;overflow-x:auto}
.tab{flex:1;min-width:80px;background:none;border:none;border-bottom:2.5px solid transparent;padding:11px 6px;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--txt2);white-space:nowrap;transition:color .2s,border-color .2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
#panels{flex:1;position:relative;overflow:hidden}
.panel{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.panel.active{display:block}
.body{max-width:680px;margin:0 auto;padding:0 1.25rem 5rem}
.sec-hdr{display:flex;align-items:center;gap:12px;padding:1.8rem 0 .5rem}
.sec-lbl{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.sub-sec{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--txt3);padding:.8rem 0 .3rem;border-bottom:1px dotted var(--border)}
.item{border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.item:hover,.item.open{background:var(--bg2)}
.item-main{display:flex;align-items:baseline;padding:12px 0;gap:8px}
.item-left{flex:1;min-width:0}
.item-name{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--txt)}
.item-meta{font-size:11px;color:var(--txt3);margin-top:2px}
.item-price{font-family:var(--serif);font-size:17px;color:var(--gold);white-space:nowrap;flex-shrink:0}
.fiche{background:var(--bg2);border-radius:8px;padding:14px 16px;margin-bottom:12px;font-size:13px}
.fi{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.fi label{color:var(--txt2);width:110px;flex-shrink:0}
.fi-note{font-size:13px;color:var(--txt2);margin-top:10px;line-height:1.6;font-style:italic}
.fi-accord{font-size:12px;color:var(--txt3);margin-top:8px}
.badge{padding:2px 8px;border-radius:12px;font-size:11px}
.badge-n{background:var(--bg2);color:var(--txt3)}
.badge-t{background:#FFF3CD;color:#856404}
.legal-box{padding:2rem 0;text-align:center}
.legal-warn,.legal-minor{font-size:11px;color:var(--txt3);line-height:1.6}
.login-box{background:white;border-radius:12px;padding:2rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);width:280px}
.login-title{font-family:var(--serif);font-size:20px;margin-bottom:1.5rem;color:var(--txt)}
.pin-inp{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:16px;text-align:center;margin-bottom:1rem;background:var(--bg);color:var(--txt)}
.btn-login{width:100%;padding:10px;background:var(--gold);border:none;color:white;border-radius:8px;font-size:15px}
.adm-hdr{display:flex;align-items:center;gap:8px;padding:.9rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;flex-shrink:0}
.adm-title{font-size:15px;font-weight:500;color:var(--txt);margin-right:auto}
.mode-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:none;font-size:12px;color:var(--txt2)}
.mode-btn.on{background:var(--gold);color:white;border-color:var(--gold)}
.adm-pdf-btn{padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:none;font-size:12px;color:var(--txt2)}
.adm-back{padding:6px 10px;border-radius:6px;border:none;background:none;font-size:13px;color:var(--gold)}
#v-edit{display:none;flex-direction:column;flex:1;overflow:hidden}
#v-edit.on{display:flex}
#v-chat{display:none;flex-direction:column;flex:1;overflow:hidden}
#v-chat.on{display:flex}
.etabs{display:flex;gap:6px;padding:.7rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.etab{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:none;font-size:12px;color:var(--txt2)}
.etab.on{background:var(--gold);color:white;border-color:var(--gold)}
.edit-list{flex:1;overflow-y:auto;padding:.5rem 1rem}
.e-sec{margin-bottom:.5rem}
.e-sec-title{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);padding:.4rem 0;margin-top:.5rem}
.e-sub{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);padding:.3rem 0 .2rem .5rem}
.e-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:.5px solid var(--border)}
.e-item.unavail{opacity:.45}
.e-tog{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:none;font-size:12px;flex-shrink:0}
.e-name{flex:1;font-size:13px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.e-price{width:60px;padding:4px 6px;border:1px solid var(--border);border-radius:5px;font-size:13px;text-align:right;background:var(--bg);color:var(--txt)}
.e-del{width:26px;height:26px;border-radius:50%;border:none;background:none;color:var(--txt3);font-size:16px;flex-shrink:0}
.e-del:hover{color:#c00}
.add-btn{margin:1rem;padding:10px;border:1.5px dashed var(--gold);border-radius:8px;background:none;color:var(--gold);font-size:13px;width:calc(100% - 2rem)}
.chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5}
.msg.user{align-self:flex-end;background:var(--gold);color:white;border-radius:12px 12px 2px 12px}
.msg.agent{align-self:flex-start;background:var(--bg2);color:var(--txt);border-radius:12px 12px 12px 2px}
.msg.sys{align-self:center;background:none;color:var(--txt2);font-size:12px;font-style:italic}
.confirm-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.btn-yes{padding:6px 12px;border-radius:6px;border:none;background:var(--gold);color:white;cursor:pointer;font-size:12px}
.btn-no{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--txt2);cursor:pointer;font-size:12px}
.btn-edit{padding:6px 12px;border-radius:6px;border:none;background:var(--gold-d);color:white;cursor:pointer;font-size:12px}
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.input-bar{display:flex;gap:8px;padding:.9rem 1rem;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.chat-inp{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--bg);color:var(--txt)}
.chat-inp:focus{outline:none;border-color:var(--gold)}
.btn-send{background:var(--gold);border:none;color:white;padding:0 16px;border-radius:6px;font-size:13px}
.btn-photo{font-size:20px;cursor:pointer;padding:0 4px;opacity:.7;display:flex;align-items:center}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:white;border-radius:16px;padding:1.5rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--serif);font-size:20px;margin-bottom:1.25rem;color:var(--txt)}
.frow{display:flex;flex-direction:column;gap:4px;margin-bottom:1rem}
.frow label{font-size:12px;color:var(--txt2)}
.frow input,.frow select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:var(--bg);color:var(--txt)}
.modal-btns{display:flex;gap:8px;margin-top:1rem}
.btn-ok{flex:1;padding:10px;background:var(--gold);border:none;color:white;border-radius:8px;font-size:15px}
.btn-cancel{padding:10px 16px;border:1px solid var(--border);background:none;border-radius:8px;font-size:15px;color:var(--txt2)}
.pdf-opt{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:14px}
.ai-status{font-size:12px;color:var(--txt3);padding:.5rem 0;min-height:24px}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--txt);color:white;padding:9px 18px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}</style>
</head>
<body>



<div id="app">
<div id="v-client">
  <div class="hdr" id="hdrEl">
    <svg width="38" height="38" viewBox="0 0 320 320" style="flex-shrink:0"><rect width="320" height="320" rx="72" fill="#1A1916"/><g transform="translate(37,45)"><rect x="19" y="0" width="22" height="16" rx="4" fill="#C9A84C"/><rect x="21" y="15" width="18" height="56" rx="1" fill="#EDE8D8"/><path d="M21,71 L4,86 L4,204 Q4,217 30,217 Q56,217 56,204 L56,86 L39,71 Z" fill="#EDE8D8"/><text x="76" y="128" font-family="Georgia,serif" font-size="82" fill="#EDE8D8">DB</text><line x1="76" y1="140" x2="246" y2="140" stroke="#C9A84C" stroke-width="1.4"/><text x="76" y="174" font-family="Georgia,serif" font-size="34" font-style="italic" fill="#C9A84C" textLength="170" lengthAdjust="spacingAndGlyphs">wine</text></g></svg>
    <div class="hdr-info">
      <div class="hdr-sup">David Boyer &middot; Meilleur Ouvrier de France &middot; 2023</div>
      <div class="hdr-title">L&rsquo;Atelier Priv&eacute;</div>
      <div class="hdr-sub">Couzeix &middot; Limoges</div>
    </div>
    <button class="btn-fs" onclick="toggleFS()">&#x26F6;</button>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab(0)">Ap&eacute;ritifs &amp; Vins au verre</button>
    <button class="tab" onclick="switchTab(1)">Carte des vins</button>
    <button class="tab" onclick="switchTab(2)">Digestifs &amp; Boissons chaudes</button>
  </div>
  <div id="panels">
    <div class="panel active"><div class="body" id="b0"></div></div>
    <div class="panel"><div class="body" id="b1"></div></div>
    <div class="panel"><div class="body" id="b2"></div></div>
  </div>
</div>
<div id="v-login">
  <div class="login-box">
    <div class="login-title">Gestion de la carte</div>
    <input type="password" id="pinInp" class="pin-inp" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">Entrer</button>
  </div>
</div>
<div id="v-admin">
  <div class="adm-hdr">
    <span class="adm-title">Gestion de la carte</span>
    <button class="mode-btn on" id="modeEdit" onclick="setMode('edit')">&#9998; Modifier</button>
    <button class="mode-btn" id="modeChat" onclick="setMode('chat')">&#128172; Assistant IA</button>
    <button class="adm-pdf-btn" onclick="exportCarte()">&#8659; Export</button>
    <button class="adm-pdf-btn" onclick="importCarte()">&#8657; Import</button>
    <button class="adm-pdf-btn" onclick="openPdfModal()">&#8681; PDF A5</button>
    <button class="adm-pdf-btn" onclick="resetKey()">&#128273;</button>
    <button class="adm-back" onclick="showClient()">&larr; Carte</button>
  </div>
  <div id="v-edit" class="on">
    <div class="etabs">
      <button class="etab on" id="etab0" onclick="renderEdit(0)">Ap&eacute;ritifs</button>
      <button class="etab" id="etab1" onclick="renderEdit(1)">Vins</button>
      <button class="etab" id="etab2" onclick="renderEdit(2)">Digestifs</button>
    </div>
    <div id="editList" class="edit-list"></div>
    <button class="add-btn" onclick="openAdd()">+ Ajouter une r&eacute;f&eacute;rence</button>
  </div>
  <div id="v-chat">
    <div class="chat" id="chat"></div>
    <div class="input-bar">
      <label class="btn-photo"><input type="file" id="photoInput" accept="image/*" style="display:none" onchange="sendPhoto(this)">&#128247;</label>
      <input class="chat-inp" id="ci" placeholder="Ex: Le Meursault est &eacute;puis&eacute;..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg(document.getElementById('ci').value)}">
      <button class="btn-send" id="sendBtn" onclick="sendMsg(document.getElementById('ci').value)">Envoyer</button>
    </div>
  </div>
</div>
</div>
<div class="modal-ov" id="keyModal" style="display:none">
 <div class="modal" style="max-width:360px">
  <div class="modal-title">Configuration API</div>
  <div class="frow"><label>Cl&eacute; API Anthropic</label><input type="password" id="keyInp" placeholder="sk-ant-..." onkeydown="if(event.key==='Enter')saveKey()"></div>
  <div class="modal-btns"><button class="btn-ok" onclick="saveKey()">Enregistrer</button></div>
 </div>
</div>
<div class="modal-ov" id="addModal" style="display:none" onclick="if(event.target===this)closeAdd()">
 <div class="modal">
  <div class="modal-title">Ajouter une r&eacute;f&eacute;rence</div>
  <div class="frow"><label>Nom *</label><input id="fn" placeholder="Ex: Meursault Les Charmes"></div>
  <div class="frow"><label>Mill&eacute;sime</label><input id="fv" placeholder="Ex: 2021"></div>
  <div class="frow"><label>Prix (&euro;) *</label><input id="fp" type="number" step="0.5" placeholder="Ex: 85"></div>
  <div class="frow"><label>Contenance</label><input id="ff" placeholder="Ex: 75 cl"></div>
  <div class="frow"><label>Degr&eacute;</label><input id="fd" placeholder="Ex: 13% vol"></div>
  <div class="frow"><label>Section</label><select id="fsec"></select></div>
  <div class="ai-status" id="aiSt"></div>
  <div class="modal-btns">
   <button class="btn-ok" id="btnAdd" onclick="saveNewItem()">Ajouter &amp; enrichir avec l&rsquo;IA</button>
   <button class="btn-cancel" onclick="closeAdd()">Annuler</button>
  </div>
 </div>
</div>
<div class="modal-ov" id="pdfModal" style="display:none" onclick="if(event.target===this)closePdfModal()">
 <div class="modal" style="max-width:320px">
  <div class="modal-title">G&eacute;n&eacute;rer un PDF A5</div>
  <label class="pdf-opt"><input type="radio" name="pdftab" value="0"><span>Ap&eacute;ritifs &amp; Vins au verre</span></label>
  <label class="pdf-opt"><input type="radio" name="pdftab" value="1"><span>Carte des vins</span></label>
  <label class="pdf-opt"><input type="radio" name="pdftab" value="2"><span>Digestifs &amp; Boissons chaudes</span></label>
  <label class="pdf-opt"><input type="radio" name="pdftab" value="all" checked><span>Carte compl&egrave;te</span></label>
  <div class="ai-status" id="pdfSt"></div>
  <div class="modal-btns">
   <button class="btn-ok" onclick="genPDF()">&#8681; T&eacute;l&eacute;charger</button>
   <button class="btn-cancel" onclick="closePdfModal()">Annuler</button>
  </div>
 </div>
</div>
<div class="toast" id="toast"></div>

// STATE
let CAT=JSON.parse(JSON.stringify(DATA));
let curTab=0,editTab=0,openId=null,tapCount=0,tapTimer=null,tx=null;
let API_KEY='',pendingEnrich=null,hist=[];
const TABS=['aperitifs','vins','digestifs'];
const PASS='atelier';

// PERSISTENCE
function save(){try{localStorage.setItem('ap-cat',JSON.stringify(CAT));}catch(e){}}
function load(){try{const d=localStorage.getItem('ap-cat');if(d)CAT=JSON.parse(d);}catch(e){}}
function toast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function findItem(id){for(const key of TABS){const tab=CAT[key];for(const sec of tab.sections){const items=sec.subsections?sec.subsections.flatMap(s=>s.items):sec.items;const it=items.find(x=>x.id===id);if(it)return it;}}return null;}

// VUES
function showClient(){document.getElementById('v-client').style.display='flex';document.getElementById('v-login').style.display='none';document.getElementById('v-admin').style.display='none';}
function showLogin(){document.getElementById('v-client').style.display='none';document.getElementById('v-admin').style.display='none';document.getElementById('v-login').style.display='flex';const p=document.getElementById('pinInp');if(p){p.value='';setTimeout(()=>p.focus(),100);}}
function showAdmin(){document.getElementById('v-client').style.display='none';document.getElementById('v-login').style.display='none';document.getElementById('v-admin').style.display='flex';}
function doLogin(){const p=document.getElementById('pinInp');if(p&&p.value===PASS){p.value='';showAdmin();setMode('edit');renderEdit(0);}else{toast('Mot de passe incorrect');if(p)p.value='';}}

// ONGLETS CLIENT
function switchTab(i){
  curTab=i;openId=null;
  document.querySelectorAll('.tab').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  renderAll();
}

// CARTE CLIENT
function toggleFiche(id){openId=openId===id?null:id;renderAll();}

function renderFiche(it){
  let rows='';
  if(it.region)rows+=`<tr><td>Région</td><td>${it.region}</td></tr>`;
  if(it.cepage)rows+=`<tr><td>Cépage</td><td>${it.cepage}</td></tr>`;
  if(it.prod)rows+=`<tr><td>Producteur</td><td>${it.prod}</td></tr>`;
  if(it.degre)rows+=`<tr><td>Degré d'alcool</td><td>${it.degre}</td></tr>`;
  if(it.fmt)rows+=`<tr><td>Contenance</td><td>${it.fmt}</td></tr>`;
  let h='<div class="fiche">';
  if(rows)h+=`<table class="fi-table">${rows}</table>`;
  if(it.note)h+=`<p class="fi-note">${it.note}</p>`;
  if(it.accord)h+=`<p class="fi-accord"><strong>Accord :</strong> ${it.accord}</p>`;
  return h+'</div>';
}

function renderItem(it){
  const px=it.p%1===0?it.p:it.p.toFixed(2);
  const meta=[it.v,it.fmt].filter(Boolean).join(' · ');
  const isOpen=it.id===openId;
  return `<div class="item${it.dispo?'':' unavail'}${isOpen?' open':''}" onclick="toggleFiche('${it.id}')">
    <div class="item-main">
      <div class="item-left">
        <div class="item-name">${it.n}</div>
        ${meta?`<div class="item-meta">${meta}</div>`:''}
      </div>
      <div class="item-price">${px}&thinsp;€</div>
    </div>${isOpen?renderFiche(it):''}
  </div>`;
}

function renderAll(){
  TABS.forEach((key,i)=>{
    const tab=CAT[key];let h='';
    tab.sections.forEach(sec=>{
      h+=`<div class="sec-title">${sec.title}</div>`;
      const ri=items=>items.forEach(it=>{h+=renderItem(it);});
      if(sec.subsections)sec.subsections.forEach(sub=>{h+=`<div class="sub-title">${sub.title}</div>`;ri(sub.items);});
      else ri(sec.items);
    });
    const el=document.getElementById('b'+i);if(el)el.innerHTML=h;
  });
}

// ADMIN MODE
function setMode(m){
  document.getElementById('v-edit').style.display=m==='edit'?'flex':'none';
  document.getElementById('v-chat').style.display=m==='chat'?'flex':'none';
  document.getElementById('modeEdit').classList.toggle('on',m==='edit');
  document.getElementById('modeChat').classList.toggle('on',m==='chat');
  if(m==='chat')initChat();
}

// ÉDITION
function renderEdit(i){
  editTab=i;
  [0,1,2].forEach(j=>{const b=document.getElementById('etab'+j);if(b)b.classList.toggle('on',j===i);});
  const el=document.getElementById('editList');if(!el)return;
  el.innerHTML='';
  const tab=CAT[TABS[i]];
  tab.sections.forEach(sec=>{
    const sd=document.createElement('div');sd.className='e-sec-title';sd.textContent=sec.title;el.appendChild(sd);
    function addItems(items){
      items.forEach(it=>{
        const px=it.p%1===0?it.p:it.p.toFixed(2);
        const meta=[it.v,it.fmt].filter(Boolean).join(' · ');
        const row=document.createElement('div');
        row.className='e-item'+(it.dispo?'':' unavail');
        const tog=document.createElement('button');tog.type='button';tog.className='e-tog';tog.textContent=it.dispo?'✓':'✗';
        tog.addEventListener('click',(id=>e=>{e.stopPropagation();toggleDispo(id);})(it.id));
        const nm=document.createElement('span');nm.className='e-name';nm.textContent=it.n+(meta?' ('+meta+')':'');
        const pr=document.createElement('input');pr.type='number';pr.className='e-price';pr.step='0.5';pr.value=px;
        pr.addEventListener('change',(id=>function(){changePrice(id,this.value);})(it.id));
        pr.addEventListener('click',function(){this.select();});
        const del=document.createElement('button');del.type='button';del.className='e-del';del.textContent='×';
        del.addEventListener('click',(id=>e=>{e.stopPropagation();delItem(id);})(it.id));
        row.appendChild(tog);row.appendChild(nm);row.appendChild(pr);row.appendChild(del);
        el.appendChild(row);
      });
    }
    if(sec.subsections)sec.subsections.forEach(sub=>{const s2=document.createElement('div');s2.className='e-sub';s2.textContent=sub.title;el.appendChild(s2);addItems(sub.items);});
    else addItems(sec.items);
  });
}

function toggleDispo(id){const it=findItem(id);if(!it)return;it.dispo=!it.dispo;save();renderAll();renderEdit(editTab);toast((it.dispo?'✓ Disponible':'✗ Épuisé')+' : '+it.n);}
function changePrice(id,v){const it=findItem(id);if(!it)return;const p=parseFloat(v);if(isNaN(p)||p<0)return;it.p=p;save();renderAll();toast('Prix : '+p+' €');}
function delItem(id){
  if(!confirm('Supprimer cette référence ?'))return;
  for(const key of TABS){const tab=CAT[key];for(const sec of tab.sections){
    if(sec.subsections){for(const sub of sec.subsections){const idx=sub.items.findIndex(x=>x.id===id);if(idx>=0){sub.items.splice(idx,1);save();renderAll();renderEdit(editTab);toast('Supprimé ✓');return;}}}
    else{const idx=sec.items.findIndex(x=>x.id===id);if(idx>=0){sec.items.splice(idx,1);save();renderAll();renderEdit(editTab);toast('Supprimé ✓');return;}}
  }}
}

function openAdd(){document.getElementById('addPanel').style.display='flex';buildSecOpts();}
function closeAdd(){document.getElementById('addPanel').style.display='none';}
function buildSecOpts(){
  const sel=document.getElementById('fsec');if(!sel)return;sel.innerHTML='';
  TABS.forEach(key=>{const tab=CAT[key];tab.sections.forEach(sec=>{
    if(sec.subsections)sec.subsections.forEach(sub=>{const o=document.createElement('option');o.value=JSON.stringify({tab:key,secId:sec.id,subId:sub.id});o.textContent=tab.label+' › '+sec.title+' › '+sub.title;sel.appendChild(o);});
    else{const o=document.createElement('option');o.value=JSON.stringify({tab:key,secId:sec.id});o.textContent=tab.label+' › '+sec.title;sel.appendChild(o);}
  });});
}

// CHAT IA
function initChat(){
  const c=document.getElementById('chat');if(!c||c.dataset.init)return;c.dataset.init='1';
  setupChatPaste();
  document.getElementById('chatDrop')?.addEventListener('dragover',e=>e.preventDefault());
  document.getElementById('chatDrop')?.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/'))sendPhoto(f);});
}
function addMsg(role,txt,opts){
  const c=document.getElementById('chat');if(!c)return;
  const d=document.createElement('div');d.className='msg msg-'+role;
  if(opts&&opts.action==='enrich_validate'){
    d.innerHTML='<div class="msg-txt">'+txt.replace(/\n/g,'<br>')+'</div>';
    const btns=document.createElement('div');btns.className='msg-btns';
    const yes=document.createElement('button');yes.className='btn-yes';yes.textContent='✓ Valider';yes.onclick=applyEnrich;
    const mod=document.createElement('button');mod.className='btn-mod';mod.textContent='✏️ Modifier';mod.onclick=()=>{const inp=document.getElementById('ci');if(inp){inp.placeholder='Que corriger ?';inp.dataset.enrich='1';inp.focus();}};
    const no=document.createElement('button');no.className='btn-no';no.textContent='✗ Annuler';no.onclick=cancelEnrich;
    btns.appendChild(yes);btns.appendChild(mod);btns.appendChild(no);d.appendChild(btns);
  } else if(opts&&opts.action==='confirm'){
    d.innerHTML='<div class="msg-txt">'+txt.replace(/\n/g,'<br>')+'</div>';
    const btns=document.createElement('div');btns.className='msg-btns';
    const yes=document.createElement('button');yes.className='btn-yes';yes.textContent='✓ Confirmer';yes.onclick=()=>{execAction(opts.act);btns.remove();};
    const no=document.createElement('button');no.className='btn-no';no.textContent='✗ Annuler';no.onclick=()=>{addMsg('sys','Annulé.');btns.remove();};
    btns.appendChild(yes);btns.appendChild(no);d.appendChild(btns);
  } else {
    d.innerHTML='<div class="msg-txt">'+txt.replace(/\n/g,'<br>')+'</div>';
  }
  c.appendChild(d);c.scrollTop=c.scrollHeight;
  if(role==='user')hist.push({role:'user',content:txt});
  else if(role==='agent')hist.push({role:'assistant',content:txt});
}
function showTyping(){const c=document.getElementById('chat');if(!c)return null;const d=document.createElement('div');d.className='msg msg-agent typing';d.innerHTML='<span></span><span></span><span></span>';c.appendChild(d);c.scrollTop=c.scrollHeight;return d;}

async function sendMsg(imgData){
  const inp=document.getElementById('ci');if(!inp)return;
  const txt=inp.value.trim();
  if(!txt&&!imgData)return;
  inp.value='';
  const isEnrich=inp.dataset.enrich==='1';
  inp.dataset.enrich='';inp.placeholder='Ex: Le Meursault est épuisé...';
  document.getElementById('sendBtn').disabled=true;

  if(isEnrich&&pendingEnrich){await handleEnrichModification(txt);document.getElementById('sendBtn').disabled=false;return;}

  if(txt)addMsg('user',txt);
  const ty=showTyping();

  const catSum=TABS.map(key=>{
    const tab=CAT[key];
    const items=tab.sections.flatMap(s=>s.subsections?s.subsections.flatMap(x=>x.items):s.items);
    return tab.label+':\n'+items.map(i=>`  [${i.id}] ${i.n}${i.v?' '+i.v:''}${i.fmt?' · '+i.fmt:''} — ${i.p}€${i.dispo?'':' (ÉPUISÉ)'}`).join('\n');
  }).join('\n\n');

  const sys=`Tu es l'assistant de L'Atelier Privé (David Boyer, MOF 2023). Tutoiement. Phrases courtes. Texte brut uniquement.

RÈGLE ABSOLUE : Appelle le tool cart_action IMMÉDIATEMENT dès que tu as toutes les infos nécessaires. Ne demande JAMAIS de confirmation par message — le bouton Confirmer dans l'interface est la validation. Si une info manque (prix ou section), demande uniquement cette info, puis appelle le tool sans hésiter.

CATALOGUE :
${catSum}`;

  const tools=[{name:'cart_action',description:'Modifier la carte des boissons',input_schema:{type:'object',properties:{action:{type:'string',enum:['unavail','avail','price','name','detail','add','enrich','add_section','add_subsection']},id:{type:'string'},tab:{type:'string'},secId:{type:'string'},nom:{type:'string'},v:{type:'string'},fmt:{type:'string'},p:{type:'number'},region:{type:'string'},cepage:{type:'string'},prod:{type:'string'},degre:{type:'string'},note:{type:'string'},accord:{type:'string'},title:{type:'string'}},required:['action']}}];

  const msgs=[...hist];
  if(imgData){msgs.push({role:'user',content:[{type:'image',source:{type:'base64',media_type:imgData.type,data:imgData.data}},{type:'text',text:txt||'Identifie ce vin et enrichis sa fiche.'}]});}

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:apiH(),body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,tools,messages:msgs})});
    const data=await r.json();
    if(ty)ty.remove();
    if(data.type==='error'){addMsg('agent','Erreur API : '+(data.error?.message||'inconnue'));document.getElementById('sendBtn').disabled=false;return;}
    let replyTxt='';
    data.content.forEach(block=>{
      if(block.type==='text')replyTxt+=block.text;
      else if(block.type==='tool_use'&&block.name==='cart_action'){
        const a=block.input;
        const desc=descAction(a);
        addMsg('agent',desc,{action:'confirm',act:a});
        return;
      }
    });
    if(replyTxt)addMsg('agent',replyTxt);
  }catch(e){if(ty)ty.remove();addMsg('agent','Erreur : '+e.message);}
  document.getElementById('sendBtn').disabled=false;
}

function descAction(a){
  const it=a.id?findItem(a.id):null;
  const nom=it?it.n:a.nom||a.id||'?';
  if(a.action==='unavail')return `Marquer "${nom}" comme épuisé ?`;
  if(a.action==='avail')return `Remettre "${nom}" disponible ?`;
  if(a.action==='price')return `Changer le prix de "${nom}" à ${a.p} € ?`;
  if(a.action==='name')return `Renommer "${nom}" en "${a.nom}" ?`;
  if(a.action==='add')return `Ajouter "${a.nom}" à ${a.p} € ?`;
  if(a.action==='enrich')return `Enrichir la fiche de "${nom}" ?`;
  if(a.action==='add_section')return `Créer la section "${a.title}" ?`;
  if(a.action==='add_subsection')return `Créer la sous-section "${a.title}" ?`;
  return JSON.stringify(a);
}

function execAction(a){
  if(a.action==='unavail'){const it=findItem(a.id);if(it){it.dispo=false;save();renderAll();addMsg('sys','✓ Épuisé : '+it.n);}}
  else if(a.action==='avail'){const it=findItem(a.id);if(it){it.dispo=true;save();renderAll();addMsg('sys','✓ Disponible : '+it.n);}}
  else if(a.action==='price'){const it=findItem(a.id);if(it){it.p=parseFloat(a.p);save();renderAll();addMsg('sys','✓ Prix mis à jour : '+it.n);}}
  else if(a.action==='name'){const it=findItem(a.id);if(it){it.n=a.nom;save();renderAll();addMsg('sys','✓ Renommé : '+it.n);}}
  else if(a.action==='detail'){const it=findItem(a.id);if(it){if(a.region)it.region=a.region;if(a.cepage)it.cepage=a.cepage;if(a.prod)it.prod=a.prod;if(a.degre)it.degre=a.degre;if(a.note)it.note=a.note;if(a.accord)it.accord=a.accord;save();renderAll();addMsg('sys','✓ Fiche mise à jour.');}}
  else if(a.action==='add'){
    const tab=CAT[a.tab];if(!tab)return;
    const sec=tab.sections.find(s=>s.id===a.secId);if(!sec)return;
    const newItem={id:'item-'+Date.now(),n:a.nom||'Nouveau',v:a.v||null,fmt:a.fmt||null,p:parseFloat(a.p)||0,degre:null,region:null,cepage:null,prod:null,note:null,accord:null,dispo:true};
    if(sec.subsections)sec.subsections[0].items.push(newItem);else sec.items.push(newItem);
    save();renderAll();addMsg('sys','✓ Ajouté — enrichissement en cours...');enrichItemWithValidation(newItem);
  }
  else if(a.action==='enrich'){const it=findItem(a.id);if(it)enrichItemWithValidation(it);}
  else if(a.action==='add_section'){const tab=CAT[a.tab];if(tab){tab.sections.push({id:'sec-'+Date.now(),title:a.title||'Nouvelle section',items:[]});save();renderAll();renderEdit(editTab);addMsg('sys','✓ Section créée : '+a.title);}}
  else if(a.action==='add_subsection'){const tab=CAT[a.tab];if(tab){const sec=tab.sections.find(s=>s.id===a.secId);if(sec){if(!sec.subsections)sec.subsections=[];sec.subsections.push({id:'sub-'+Date.now(),title:a.title||'Nouvelle sous-section',items:[]});save();renderAll();renderEdit(editTab);addMsg('sys','✓ Sous-section créée : '+a.title);}}}
}

// ENRICHISSEMENT IA
async function enrichItemWithValidation(item){
  addMsg('agent','Recherche en cours pour "'+item.n+'"...');
  if(!API_KEY){addMsg('agent','Clé API manquante — bouton 🔑 en haut à droite.');return;}
  const prompt='Tu es sommelier expert. Produit : "'+item.n+'"'+(item.v?' millésime '+item.v:'')+(item.fmt?' '+item.fmt:'')+'. Retourne UNIQUEMENT un JSON valide sans backticks : {"nom":"...","region":"...","cepage":"...","prod":"...","degre":"...","note":"...","accord":"..."}';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:apiH(),body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    if(data.type==='error'||!data.content){addMsg('agent','Erreur API enrichissement.');return;}
    const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    const match=raw.match(/\{[\s\S]*\}/);
    if(!match){addMsg('agent','Réponse non analysable.');return;}
    const info=JSON.parse(match[0]);
    pendingEnrich={item,info};
    let msg='Informations trouvées pour "'+item.n+'" :\n\n';
    if(info.nom&&info.nom!==item.n)msg+='Nom : '+info.nom+'\n';
    if(info.region)msg+='Région : '+info.region+'\n';
    if(info.cepage)msg+='Cépage : '+info.cepage+'\n';
    if(info.prod)msg+='Producteur : '+info.prod+'\n';
    if(info.degre)msg+='Degré : '+info.degre+'\n';
    if(info.note)msg+='\n'+info.note+'\n';
    if(info.accord)msg+='\nAccord : '+info.accord;
    msg+='\n\nValider, modifier ou annuler ?';
    addMsg('agent',msg,{action:'enrich_validate'});
  }catch(e){addMsg('agent','Erreur : '+e.message);}
}
function applyEnrich(){
  if(!pendingEnrich)return;
  const {item,info}=pendingEnrich;
  if(info.nom)item.n=info.nom;if(info.region)item.region=info.region;if(info.cepage)item.cepage=info.cepage;
  if(info.prod)item.prod=info.prod;if(info.degre)item.degre=info.degre;if(info.note)item.note=info.note;if(info.accord)item.accord=info.accord;
  save();renderAll();addMsg('sys','✓ Fiche mise à jour.');toast('Enrichi ✓');pendingEnrich=null;
}
function cancelEnrich(){addMsg('sys','Annulé.');pendingEnrich=null;}
async function handleEnrichModification(txt){
  if(!pendingEnrich)return;
  const {item,info}=pendingEnrich;
  const prompt='Infos actuelles : '+JSON.stringify(info)+'. Modification : "'+txt+'". Retourne UNIQUEMENT le JSON corrigé :';
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:apiH(),body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    const raw=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    const match=raw?.match(/\{[\s\S]*\}/);
    if(match){
      pendingEnrich.info=JSON.parse(match[0]);const ni=pendingEnrich.info;
      let msg='Infos modifiées :\n';
      if(ni.nom)msg+='Nom : '+ni.nom+'\n';if(ni.region)msg+='Région : '+ni.region+'\n';
      if(ni.cepage)msg+='Cépage : '+ni.cepage+'\n';if(ni.note)msg+='\n'+ni.note+'\n';if(ni.accord)msg+='\nAccord : '+ni.accord;
      msg+='\n\nValider, modifier encore ou annuler ?';
      addMsg('agent',msg,{action:'enrich_validate'});
    }else{addMsg('agent','Reformule ta correction.');}
  }catch(e){addMsg('agent','Erreur : '+e.message);}
}

// PDF A5
function openPdfModal(){document.getElementById('pdfModal').style.display='flex';}
function closePdfModal(){document.getElementById('pdfModal').style.display='none';}

async function genPDF(){
  const sel=document.querySelector('input[name="pdftab"]:checked');if(!sel)return;
  const lib=window.html2pdf;if(!lib){toast('Librairie PDF non chargée');return;}
  document.getElementById('pdfSt').textContent='⏳ Génération...';
  const val=sel.value;const tabIndices=val==='all'?[0,1,2]:[parseInt(val)];
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

  function hdr(){return '<div style="text-align:center;padding-bottom:6mm;margin-bottom:6mm;border-bottom:1pt solid #E0DDD4;page-break-inside:avoid"><div style="font-size:7pt;letter-spacing:.3em;text-transform:uppercase;color:#6B6860;margin-bottom:2mm">David Boyer · Meilleur Ouvrier de France · 2023</div><div style="font-family:Georgia,serif;font-size:20pt;font-weight:400;color:#1A1916;margin-bottom:1.5mm">L\'Atelier Privé</div><div style="font-size:6.5pt;letter-spacing:.22em;text-transform:uppercase;color:#9E9C97">Couzeix · Limoges</div></div>';}
  function ftr(){return '<div style="margin-top:8mm;padding-top:4mm;border-top:.5pt solid #E0DDD4;text-align:center;font-size:6.5pt;color:#9E9C97;line-height:1.9;page-break-inside:avoid">L\'abus d\'alcool est dangereux pour la santé — À consommer avec modération<br>La vente d\'alcool est interdite aux mineurs de moins de 18 ans</div>';}
  function itemHtml(it){const px=it.p%1===0?it.p:it.p.toFixed(2);const meta=[it.v,it.fmt].filter(Boolean).join(' · ');return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:2mm 0;border-bottom:.3pt solid #F0EDE8;gap:5mm"><div style="flex:1;min-width:0"><div style="font-size:10pt;font-family:Georgia,serif;color:#1A1916;line-height:1.3">'+it.n+'</div>'+(meta?'<div style="font-size:7pt;color:#6B6860;margin-top:.5mm">'+meta+'</div>':'')+'</div><div style="font-size:10pt;font-family:Georgia,serif;color:#C9A84C;white-space:nowrap;flex-shrink:0">'+px+' €</div></div>';}
  function secHtml(title,items){const v=items.filter(it=>it.dispo);if(!v.length)return '';const t='<div style="font-size:7.5pt;letter-spacing:.28em;text-transform:uppercase;color:#C9A84C;padding-bottom:1.5mm;border-bottom:.5pt solid #E0DDD4">'+title+'</div>';let h='<div style="page-break-inside:avoid;margin-top:5mm">'+t+itemHtml(v[0])+'</div>';v.slice(1).forEach(it=>{h+='<div style="page-break-inside:avoid">'+itemHtml(it)+'</div>';});return h;}
  function subHtml(title,items){const v=items.filter(it=>it.dispo);if(!v.length)return '';const t='<div style="font-size:7pt;letter-spacing:.16em;text-transform:uppercase;color:#9E9C97;padding-left:3mm;border-left:1.5pt solid #D4C090">'+title+'</div>';let h='<div style="page-break-inside:avoid;margin-top:4mm">'+t+itemHtml(v[0])+'</div>';v.slice(1).forEach(it=>{h+='<div style="page-break-inside:avoid">'+itemHtml(it)+'</div>';});return h;}
  function buildTab(i){const tab=CAT[TABS[i]];let b='';tab.sections.forEach(sec=>{if(sec.subsections){const f=sec.subsections.find(s=>s.items.some(it=>it.dispo));if(!f)return;const v=f.items.filter(it=>it.dispo);const mt='<div style="font-size:7.5pt;letter-spacing:.28em;text-transform:uppercase;color:#C9A84C;padding-bottom:1.5mm;border-bottom:.5pt solid #E0DDD4">'+sec.title+'</div>';const st='<div style="font-size:7pt;letter-spacing:.16em;text-transform:uppercase;color:#9E9C97;padding-left:3mm;border-left:1.5pt solid #D4C090;margin:4mm 0 0">'+f.title+'</div>';b+='<div style="page-break-inside:avoid;margin-top:5mm">'+mt+st+itemHtml(v[0])+'</div>';v.slice(1).forEach(it=>{b+='<div style="page-break-inside:avoid">'+itemHtml(it)+'</div>';});sec.subsections.filter(s=>s!==f).forEach(sub=>{b+=subHtml(sub.title,sub.items);});}else{b+=secHtml(sec.title,sec.items);}});return b;}

  const opts={margin:[20,14,18,14],image:{type:'jpeg',quality:0.98},html2canvas:{scale:2,useCORS:true,letterRendering:true,scrollX:0,scrollY:0},jsPDF:{unit:'mm',format:'a5',orientation:'portrait'},pagebreak:{mode:['css','legacy']}};

  for(let idx=0;idx<tabIndices.length;idx++){
    const i=tabIndices[idx];
    const wrap=document.createElement('div');
    wrap.innerHTML=hdr()+buildTab(i)+ftr();
    document.body.appendChild(wrap);
    document.getElementById('pdfSt').textContent='⏳ '+(idx+1)+'/'+tabIndices.length+'...';
    const names=['DB-WINE-aperitifs.pdf','DB-WINE-vins.pdf','DB-WINE-digestifs.pdf'];
    const worker=lib().set({...opts,filename:names[i]}).from(wrap);
    if(isIOS){const d=await worker.outputPdf('datauristring');document.body.removeChild(wrap);window.open(d,'_blank');}
    else{await worker.save();document.body.removeChild(wrap);}
    if(idx<tabIndices.length-1)await new Promise(r=>setTimeout(r,400));
  }
  document.getElementById('pdfSt').textContent='';closePdfModal();toast('PDF généré ✓');
}
